<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Access</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #0a0f1c, #0d1b2a);
  color: #fff;
  overflow: hidden;
}

/* Background glow animation */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%);
  animation: moveBg 10s linear infinite;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-20%, -20%); }
  100% { transform: translate(0,0); }
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  animation: fadeDown 1s ease;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Container */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 85vh;
}

/* Card */
.card {
  background: linear-gradient(145deg, #2c2f36, #1b1e24);
  padding: 25px;
  border-radius: 18px;
  width: 320px;
  text-align: center;
  box-shadow: 0 15px 50px rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.1);
  animation: fadeUp 1s ease;
  position: relative;
}

/* Shine effect */
.card::after {
  content: "";
  position: absolute;
  top: -100%;
  left: -50%;
  width: 200%;
  height: 300%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: rotate(25deg);
  animation: shine 5s infinite;
}

@keyframes shine {
  0% { top: -100%; }
  100% { top: 200%; }
}

/* Fade up */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Floating card */
.card:hover {
  transform: translateY(-5px) scale(1.01);
}

/* Title */
h1 {
  margin-bottom: 5px;
}

/* Price glow */
.price {
  font-size: 30px;
  margin: 10px 0;
  color: #2ecc71;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #2ecc71; }
  to { text-shadow: 0 0 20px #2ecc71; }
}

/* Features */
.features {
  text-align: left;
  margin: 15px 0;
  font-size: 14px;
  color: #ccc;
}

.features li {
  margin-bottom: 8px;
  transition: 0.3s;
}

.features li:hover {
  transform: translateX(5px);
  color: #fff;
}

/* Button */
.btn {
  background: linear-gradient(145deg, #000, #222);
  color: #fff;
  padding: 14px;
  border: none;
  border-radius: 12px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
  position: relative;
  overflow: hidden;
}

/* Button pulse */
.btn::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.1);
  top: 0;
  left: -100%;
  transition: 0.5s;
}

.btn:hover::before {
  left: 100%;
}

/* Click animation */
.btn:active {
  transform: scale(0.95);
}

/* UPI */
.upi {
  margin-top: 15px;
  font-size: 13px;
  color: #bbb;
}

.upi span {
  display: block;
  font-weight: bold;
  margin-top: 5px;
  cursor: pointer;
}

/* Copy animation */
.upi span:active {
  color: #2ecc71;
}

/* Footer */
.trust {
  text-align: center;
  padding: 20px;
  font-size: 14px;
  color: #ccc;
  animation: fadeUp 1.5s ease;
}

.badges img {
  height: 40px;
  margin: 5px;
  transition: 0.3s;
}

.badges img:hover {
  transform: scale(1.2);
}
</style>
</head>

</div>

  <div class="card">

    <ul class="features">

    </ul>

    <button class="btn" onclick="payNow()">🚀 Unlock Now</button>

  </div>

  </div>
</div>
