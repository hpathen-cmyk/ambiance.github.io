<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Access</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1117;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  background: #161b22;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 340px;
  text-align: center;
}

/* Preview */
.preview {
  width: 100%;
  border-radius: 10px;
  filter: blur(8px);
}

/* Price */
.price {
  font-size: 24px;
  color: #2ecc71;
  margin: 10px 0;
}

/* Button */
.btn {
  background: #2ecc71;
  border: none;
  padding: 14px;
  width: 100%;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

/* Unlock button hidden */
.unlock {
  display: none;
  background: #00c853;
}

.footer {
  margin-top: 10px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="card">

  <h2>🔥 Premium Content</h2>

  <!-- 🔥 BLUR IMAGE -->
  <img src="https://via.placeholder.com/300x200" class="preview" id="preview">

  <div class="price">₹29</div>

  <button class="btn" onclick="payNow()">Pay & Unlock</button>

  <!-- 🔓 Unlock button -->
  <button class="btn unlock" id="unlockBtn" onclick="unlockContent()">Click to View Content</button>

  <div class="footer">
    UPI: tkhamsa985-1@okaxis<br>
    🔒 Secure Payment
  </div>

</div>

<script>
function payNow() {
  window.location.href =
  "upi://pay?pa=tkhamsa985-1@okaxis&pn=Sooraj%20Krishna&am=29&cu=INR";

  // Fake unlock after 5 sec
  setTimeout(() => {
    document.getElementById("unlockBtn").style.display = "block";
  }, 5000);
}

function unlockContent() {
  document.getElementById("preview").style.filter = "blur(0px)";
}
</script>

</body>
</html>
