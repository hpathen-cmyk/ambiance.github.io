<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Premium Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
      text-align: center;
    }

    /* Background animation */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #000, #0f2027, #000);
      animation: move 6s infinite linear;
      z-index: -1;
    }

    @keyframes move {
      0% {filter: hue-rotate(0deg);}
      100% {filter: hue-rotate(360deg);}
    }

    .box {
      margin-top: 100px;
      background: #111;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    h2 {
      margin-bottom: 10px;
    }

    .price {
      color: #00ffcc;
      font-size: 24px;
      margin: 10px 0;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 10px;
      font-size: 18px;
      margin-top: 15px;
      cursor: pointer;
    }

    .upi {
      margin-top: 15px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="box">
  <h2>🔥 Premium Access</h2>
  <div class="price">₹29 Only</div>

  <button onclick="payNow()">Unlock Now</button>

  <div class="upi">
    UPI: tkhamsa985-1@okaxis
  </div>
</div>

<script>
function payNow() {
  window.location.href =
  "upi://pay?pa=tkhamsa985-1@okaxis&pn=Sooraj%20Krishna&am=29&cu=INR";
}
</script>

</body>
</html>
