<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Access</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #0a0f1c, #0d1b2a);
  color: #fff;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.navbar h2 {
  margin: 0;
  letter-spacing: 2px;
}

.navbar button {
  background: transparent;
  border: 1px solid #aaa;
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
}

/* Center layout */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 85vh;
}

/* Card */
.card {
  background: linear-gradient(145deg, #2c2f36, #1b1e24);
  padding: 25px;
  border-radius: 16px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.1);
}

/* Title */
.card h1 {
  margin-bottom: 5px;
}

.price {
  font-size: 28px;
  margin: 10px 0;
}

/* Features */
.features {
  text-align: left;
  margin: 15px 0;
  font-size: 14px;
  color: #ccc;
}

.features li {
  margin-bottom: 8px;
}

/* Button */
.btn {
  background: linear-gradient(145deg, #000, #222);
  color: #fff;
  padding: 14px;
  border: none;
  border-radius: 12px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.btn:hover {
  transform: scale(1.03);
}

/* Manual payment */
.upi {
  margin-top: 15px;
  font-size: 13px;
  color: #bbb;
}

.upi span {
  display: block;
  font-weight: bold;
  margin-top: 5px;
}

/* Footer trust */
.trust {
  text-align: center;
  padding: 20px;
  font-size: 14px;
  color: #ccc;
}

.badges {
  margin-top: 10px;
}

.badges img {
  height: 40px;
  margin: 5px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <h2>PREMIUM</h2>
  <button>Login</button>
</div>

<!-- Main -->
<div class="container">
  <div class="card">

    <h1>Premium Access</h1>
    <div class="price">₹29 Only</div>

    <ul class="features">
      <li>⏱ Instant access after payment</li>
      <li>💎 High quality exclusive content</li>
      <li>🔒 Private & secure</li>
    </ul>

    <button class="btn" onclick="payNow()">🚀 Unlock Now</button>

    <div class="upi">
      Or pay manually:
      <span id="upi">tkhamsa985-1@okaxis</span>
    </div>

    <div class="upi">🔒 100% Secure Payment</div>

  </div>
</div>

<!-- Trust -->
<div class="trust">
  <div>Trust Banner</div>
  <div class="badges">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Visa.svg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/UPI-Logo-vector.svg">
  </div>
</div>

<script>
function payNow() {
  window.location.href =
  "upi://pay?pa=tkhamsa985-1@okaxis&pn=Sooraj%20Krishna&am=29&cu=INR";
}
</script>

</body>
</html>
