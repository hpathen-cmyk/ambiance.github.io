<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #0a0a0a, #000);
      overflow: hidden;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* 💧 Water Drop */
    .drop {
      position: absolute;
      top: -50px;
      left: 50%;
      width: 12px;
      height: 12px;
      background: #00e5ff;
      border-radius: 50%;
      transform: translateX(-50%);
      animation: drop 2s infinite ease-in;
    }

    @keyframes drop {
      0% { top: -50px; opacity: 1; }
      80% { top: 60%; }
      100% { top: 60%; opacity: 0; }
    }

    /* 🌊 Ripple Effect */
    .ripple {
      position: absolute;
      top: 60%;
      left: 50%;
      width: 20px;
      height: 20px;
      border: 2px solid #00e5ff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ripple 2s infinite;
    }

    @keyframes ripple {
      0% {
        width: 20px;
        height: 20px;
        opacity: 0.7;
      }
      100% {
        width: 200px;
        height: 200px;
        opacity: 0;
      }
    }

    /* Glass Card */
    .container {
      position: relative;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 30px 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      z-index: 10;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 22px;
      color: #00e5ff;
      margin: 10px 0 20px;
      font-weight: bold;
    }

    .features {
      text-align: left;
      font-size: 14px;
      margin-bottom: 20px;
      color: #ccc;
    }

    .features li {
      margin-bottom: 8px;
    }

    button {
      background: linear-gradient(135deg, #00e5ff, #00bcd4);
      color: white;
      border: none;
      padding: 15px;
      width: 100%;
      font-size: 17px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(0,229,255,0.5);
    }

    .upi {
      margin-top: 15px;
      font-size: 13px;
      color: #aaa;
    }

    .badge {
      margin-top: 15px;
      font-size: 12px;
      color: #00e5ff;
    }

  </style>
</head>

<body>

  <!-- 💧 Animation -->
  <div class="drop"></div>
  <div class="ripple"></div>

  <div class="container">
    <h2>🔥 Premium Access</h2>
    <p class="price">₹29 Only</p>

    <ul class="features">
      <li>✔ Instant access after payment</li>
      <li>✔ High quality exclusive content</li>
      <li>✔ Private & secure</li>
    </ul>

    <button onclick="payNow()">🚀 Unlock Now</button>

    <div class="upi">
      Or pay manually:<br>
      <b>tkhamsa985-1@okaxis</b>
    </div>

    <div class="badge">🔒 100% Secure Payment</div>
  </div>

  <script>
    function payNow() {
      window.location.href = "upi://pay?pa=tkhamsa985-1@okaxis&pn=Sooraj%20Krishna&am=29&cu=INR&tn=Premium%20Access";
    }
  </script>

</body>
</html>
