<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Content</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #0a0f1c, #0d1b2a);
  color: #fff;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(255,255,255,0.05);
}

/* Container */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 85vh;
}

/* Card */
.card {
  background: #1b1e24;
  padding: 25px;
  border-radius: 16px;
  width: 320px;
  text-align: center;
}

/* Button */
.btn {
  background: #2ecc71;
  color: #000;
  padding: 14px;
  border: none;
  border-radius: 10px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  margin-top: 15px;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 12px;
  color: #888;
  padding: 15px;
}
</style>
</head>

<body>

<div class="navbar">
  <b>CONTENT HUB</b>
  <span>Info</span>
</div>

<div class="container">
  <div class="card">

    <h2>Premium Content Access</h2>

    <p style="font-size:14px;color:#ccc;">
      Get access to exclusive premium content.  
      High-quality and regularly updated.
    </p>

    <!-- Safe Button -->
    <button class="btn" onclick="showInfo()">Get Access</button>

    <p style="font-size:12px;color:#aaa;margin-top:15px;">
      Access is provided after confirmation.
    </p>

  </div>
</div>

<div class="footer">
  © 2026 Content Hub | contact@email.com
</div>

<script>
function showInfo() {
  alert("Contact support to get access details.");
}
</script>

</body>
</html>
