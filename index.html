<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #0a0a0a, #000);
      overflow: hidden;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* 💧 Water Drop */
    .drop {
      position: absolute;
      top: -50px;
      left: 50%;
      width: 12px;
      height: 12px;
      background: #00e5ff;
      border-radius: 50%;
      transform: translateX(-50%);
      animation: drop 2s infinite ease-in;
    }

    @keyframes drop {
      0% { top: -50px; opacity: 1; }
      80% { top: 60%; }
      100% { top: 60%; opacity: 0; }
    }

    /* 🌊 Ripple Effect */
    .ripple {
      position: absolute;
      top: 60%;
      left: 50%;
      width: 20px;
      height: 20px;
      border: 2px solid #00e5ff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ripple 2s infinite;
    }

    @keyframes ripple {
      0% {
        width: 20px;
        height: 20px;
        opacity: 0.7;
      }
      100% {
        width: 200px;
        height: 200px;
        opacity: 0;
      }
    }
