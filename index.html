<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Access</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #0a0f1c, #0d1b2a);
  color: #fff;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* Container */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 85vh;
}

/* Card */
.card {
  background: linear-gradient(145deg, #2c2f36, #1b1e24);
  padding: 25px;
  border-radius: 18px;
  width: 320px;
  text-align: center;
  box-shadow: 0 15px 50px rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.1);
  animation: fadeIn 1s ease;
}

/* Animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Price */
.price {
  font-size: 28px;
  color: #2ecc71;
  margin: 10px 0;
}

/* Features */
.features {
  text-align: left;
  margin: 15px 0;
  font-size: 14px;
  color: #ccc;
}

.features li {
  margin-bottom: 8px;
}

/* Button */
.btn {
  background: #2ecc71;
  color: #000;
  padding: 14px;
  border: none;
  border-radius: 12px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

/* UPI */
.upi {
  margin-top: 15px;
  font-size: 13px;
  color: #bbb;
}

.upi span {
  display: block;
  font-weight: bold;
  margin-top: 5px;
  cursor: pointer;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 12px;
  color: #888;
  padding: 15px;
}
</style>
</head>

<div class="navbar">

</div>

<div class="container">
  <div class="card">

    <div class="upi">

    </div>

    <div class="upi">🔒 Secure Payment</div>

    <p style="font-size:12px;color:#aaa;margin-top:10px;">
      After payment, contact support to receive access.
    </p>

  </div>
</div>

<div class="footer">
  Contact: support@email.com
</div>
