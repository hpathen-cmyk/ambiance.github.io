<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Access</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 18px 25px;
  background: rgba(255,255,255,0.05);
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 90vh;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  width: 330px;
  text-align: center;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  margin-top: 15px;
  background: linear-gradient(90deg,#22c55e,#4ade80);
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="navbar">
  <b>CONTENT HUB</b>
  <span>Premium</span>
</div>

<div class="container">
  <div class="card">

    <h2>Premium Access 🔒</h2>

    <p style="color:#ccc;font-size:14px;">
      Unlock exclusive premium content securely.
    </p>

    <!-- SAFE REDIRECT BUTTON -->
    <button class="btn" onclick="goToPayment()">Continue</button>

    <p style="font-size:12px;color:#aaa;margin-top:15px;">
      Secure payment • No data stored
    </p>

  </div>
</div>

<script>
function goToPayment(){
  window.location.href = "pay.html";
}
</script>

</body>
</html>
