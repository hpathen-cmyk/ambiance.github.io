<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Access</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #fff;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 18px 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* Container */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 85vh;
}

/* Card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  width: 330px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* Buttons */
.btn {
  padding: 14px;
  border-radius: 12px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  margin-top: 12px;
  border: none;
}

/* Primary */
.pay-btn {
  background: linear-gradient(90deg, #22c55e, #4ade80);
  color: #000;
  font-weight: bold;
}

/* Backup */
.backup-btn {
  background: #1e293b;
  color: #fff;
  border: 1px solid #334155;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 12px;
  color: #777;
  padding: 15px;
}
</style>
</head>

<body>

<div class="navbar">
  <b>CONTENT HUB</b>
  <span>Premium</span>
</div>

<div class="container">
  <div class="card">

    <h2>Premium Access 🔒</h2>

    <p style="font-size:14px;color:#ccc;">
      Unlock exclusive premium content.  
      Instant access after payment.
    </p>

    <!-- MAIN PAY BUTTON -->
    <button class="btn pay-btn" onclick="payNow()">Pay ₹99</button>

    <!-- BACKUP BUTTON -->
    <button class="btn backup-btn" onclick="showBackup()">Other Payment Options</button>

    <p style="font-size:12px;color:#aaa;margin-top:15px;">
      Secure UPI Payment
    </p>

  </div>
</div>

<div class="footer">
  © 2026 Content Hub
</div>

<script>
function payNow() {
  window.location.href = "upi://pay?pa=tkhamsa985-1@okaxis&pn=ContentHub&am=99&cu=INR";
}

function showBackup() {
  alert("If UPI not opening:\n\n1. Open Google Pay / PhonePe\n2. Pay to UPI ID:\n\n tkhamsa985-1@okaxis");
}
</script>

</body>
</html>
