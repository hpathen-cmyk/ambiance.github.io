<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Solver GPT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Math.js (safe math parser) -->
<script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #2563eb;
  align-self: flex-end;
}

.bot {
  background: #334155;
  align-self: flex-start;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🧮 Math Solver GPT</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Enter math (e.g. 2+2 or 5*x=10)">
  <button onclick="solve()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function solve() {
  let input = document.getElementById("input").value.trim();
  if (!input) return;

  addMessage(input, "user");
  document.getElementById("input").value = "";

  try {
    let result;

    // Check if it's an equation
    if (input.includes("=")) {
      let sides = input.split("=");
      let expr = `${sides[0]} - (${sides[1]})`;

      let simplified = math.simplify(expr).toString();
      result = "Rearranged: " + simplified + " = 0\n";

      try {
        let solution = math.solve(expr, 'x');
        result += "Solution: x = " + solution;
      } catch {
        result += "Could not solve symbolically";
      }

    } else {
      result = math.evaluate(input);
    }

    addMessage(result.toString(), "bot");

  } catch (err) {
    addMessage("❌ Invalid math input", "bot");
  }
}
</script>

</body>
</html>
